version: 1.3.11

speech:
  speechTab:
    textToSpeech: true
    engineTTS: "browser"
    languageTTS: "es"
    automaticPlayback: true
    cacheTTS: false
  tts:
    autoRead: true

mcpSettings:
  allowedAddresses:
    - "mcpstv.railway.internal:3001"

mcpServers:
  mcp-stv:
    type: sse
    description: "Servidor MCP diseñado para STV"
    url: http://mcpstv.railway.internal:3001/sse
    timeout: 30000
    initTimeout: 10000
